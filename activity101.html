<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AJ — Activity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #0e0e0e;
      --card-bg: #141414;
      --border:  rgba(255,255,255,0.07);
      --text:    #e8e4dc;
      --muted:   #5a5a5a;
      --accent:  #c9714a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier Prime', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: #2a2a2a; opacity: 0.18; top: -150px; left: -150px; }
    .blob-2 { width: 320px; height: 320px; background: #1e1e1e; opacity: 0.22; bottom: 5%;  right: -80px; }
    .blob-3 { width: 180px; height: 180px; background: var(--accent); opacity: 0.05; top: 45%; left: 52%; }

    .dot { position: fixed; width: 3px; height: 3px; background: var(--muted); border-radius: 50%; opacity: 0.35; pointer-events: none; z-index: 0; }

    /* ── Nav — logo left, links right ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 48px;
    }

    .nav-logo {
      font-family: 'Courier Prime', monospace;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 1;
      padding: 130px 48px 80px;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ── Page heading ── */
    .heading {
      margin-bottom: 56px;
      animation: fadeUp 0.6s ease both;
    }
    .heading-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .heading-title {
      font-family: 'Caveat', cursive;
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      font-weight: 600;
      line-height: 1;
      margin-bottom: 14px;
    }
    .heading-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, var(--accent), transparent);
    }

    /* ── Cards Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.6s ease both;
      transition: border-color 0.3s, transform 0.3s;
    }
    .card:hover { border-color: rgba(201,113,74,0.3); transform: translateY(-3px); }
    .card:nth-child(1) { animation-delay: 0.10s; }
    .card:nth-child(2) { animation-delay: 0.20s; }
    .card:nth-child(3) { animation-delay: 0.30s; }
    .card:nth-child(4) { animation-delay: 0.40s; }
    .card:nth-child(5) { animation-delay: 0.50s; }
    .card:nth-child(6) { animation-delay: 0.60s; }

    .card-img {
      width: 100%;
      height: 200px;
      background-color: #1a1a1a;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 5px 12px;
      pointer-events: none;
    }
    .card-img[style*="url('"]:not([style*="url('')"]) .card-img-label { display: none; }

    /* ── Card footer ── */
    .card-footer {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .card-name {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.75;
    }

    /* ── Play button — bigger & easier to tap ── */
    .btn-play {
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(201,113,74,0.4);
      padding: 10px 22px;
      text-decoration: none;
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .btn-play:hover { background: var(--accent); color: #0e0e0e; }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      main  { padding: 120px 28px 60px; }
      nav   { padding: 18px 28px; }
    }
    @media (max-width: 580px) {
      .grid { grid-template-columns: 1fr; }
      nav   { padding: 16px 20px; }
      .nav-links { display: none; }
      main  { padding: 100px 18px 48px; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════════
       GAME MODAL OVERLAY
    ══════════════════════════════════════════ */
    #game-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      animation: fadeIn 0.25s ease both;
    }
    #game-modal.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Top bar inside modal */
    .modal-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 10px 0;
    }
    .modal-game-title {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .modal-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-btn {
      font-family: 'Courier Prime', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 16px;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .modal-btn:hover { border-color: rgba(201,113,74,0.5); color: var(--accent); }
    .modal-btn.close-btn { border-color: rgba(255,255,255,0.12); }
    .modal-btn.close-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

    /* ESC hint */
    .esc-hint {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 8px;
      align-self: flex-end;
      max-width: 900px;
      width: 100%;
      text-align: right;
    }

    /* Game frame wrapper */
    .game-frame-wrap {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 10;
      border: 1px solid var(--border);
      position: relative;
      background: #000;
      overflow: hidden;
    }
    .game-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    /* Fullscreen state — expand wrapper to fill screen */
    #game-modal.fullscreen .game-frame-wrap {
      max-width: 100vw;
      width: 100vw;
      height: 100vh;
      aspect-ratio: unset;
      border: none;
    }
    #game-modal.fullscreen .modal-bar,
    #game-modal.fullscreen .esc-hint {
      max-width: 100vw;
      padding-left: 24px;
      padding-right: 24px;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="dot" style="top:20%;left:7%"></div>
  <div class="dot" style="top:60%;left:50%"></div>
  <div class="dot" style="top:80%;right:12%"></div>

  <!-- ── Nav ── -->
  <nav>
    <a href="https://www.artjomjapins.site/" class="nav-logo">AJ</a>
    <ul class="nav-links">
      <li><a href="https://www.artjomjapins.site/#about">About</a></li>
      <li><a href="https://www.artjomjapins.site/#projects">Projects</a></li>
      <li><a href="https://www.artjomjapins.site/#contact">Contact</a></li>
    </ul>
  </nav>

  <main>

    <div class="heading">
      <p class="heading-label">Games — 2026</p>
      <h1 class="heading-title">Selected Games</h1>
      <div class="heading-line"></div>
    </div>

    <div class="grid">

      <!-- CARD 1 — BitLife -->
      <div class="card">
        <div class="card-img" style="background-image: url('')">
          <span class="card-img-label">Add Image</span>
        </div>
        <div class="card-footer">
          <span class="card-name">BitLife</span>
          <button class="btn-play"
             onclick="openGame('BitLife', 'https://cdn.myunblockedgames.com/games/bitlife/index.html')">Play →</button>
        </div>
      </div>

      <!-- CARD 2 -->
      <div class="card">
        <div class="card-img" style="background-image: url('')">
          <span class="card-img-label">Add Image</span>
        </div>
        <div class="card-footer">
          <span class="card-name">Game Two</span>
          <button class="btn-play"
             onclick="openGame('Game Two', 'PASTE_GAME_URL_HERE')">Play →</button>
        </div>
      </div>

      <!-- CARD 3 -->
      <div class="card">
        <div class="card-img" style="background-image: url('')">
          <span class="card-img-label">Add Image</span>
        </div>
        <div class="card-footer">
          <span class="card-name">Game Three</span>
          <button class="btn-play"
             onclick="openGame('Game Three', 'PASTE_GAME_URL_HERE')">Play →</button>
        </div>
      </div>

      <!-- ADD MORE CARDS BELOW ↓ -->

    </div>
  </main>

  <footer>AJ — artjomjapins.site</footer>

  <!-- ══════════════════════════════════════════
       GAME MODAL
  ══════════════════════════════════════════ -->
  <div id="game-modal">
    <div class="modal-bar">
      <span class="modal-game-title" id="modal-title">Game</span>
      <div class="modal-controls">
        <button class="modal-btn" id="fs-btn" onclick="toggleFullscreen()">
          <!-- fullscreen icon -->
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8"/>
          </svg>
          Fullscreen
        </button>
        <button class="modal-btn close-btn" onclick="closeGame()">✕ Close</button>
      </div>
    </div>
    <div class="game-frame-wrap">
      <iframe id="game-iframe" src="" allowfullscreen></iframe>
    </div>
    <span class="esc-hint">Press ESC to close</span>
  </div>

  <script>
    const modal   = document.getElementById('game-modal');
    const iframe  = document.getElementById('game-iframe');
    const titleEl = document.getElementById('modal-title');
    const fsBtn   = document.getElementById('fs-btn');

    function openGame(name, url) {
      titleEl.textContent = name;
      iframe.src = url;
      modal.classList.add('active');
      modal.classList.remove('fullscreen');
      document.body.style.overflow = 'hidden';
    }

    function closeGame() {
      modal.classList.remove('active', 'fullscreen');
      iframe.src = '';
      document.body.style.overflow = '';
    }

    function toggleFullscreen() {
      modal.classList.toggle('fullscreen');
      const isFs = modal.classList.contains('fullscreen');
      fsBtn.innerHTML = isFs
        ? `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
             <path d="M4 1v3H1M8 1v3h3M1 8h3v3M8 11V8h3"/>
           </svg> Exit Full`
        : `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
             <path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8"/>
           </svg> Fullscreen`;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        if (modal.classList.contains('fullscreen')) {
          toggleFullscreen();     // exit fullscreen first
        } else {
          closeGame();            // then close on second ESC
        }
      }
    });
  </script>

</body>
</html>
